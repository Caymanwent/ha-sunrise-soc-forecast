type: markdown
content: |
  {% set pre_sunrise = state_attr('sensor.predicted_sunrise_soc_day_1', 'mode') == 'nighttime' and now().hour < 12 -%}
  | Day | Status | SoC % | kWh | Day Low | Floor | Solcast | Daytime | Backup | Grid Need |
  |-----|--------|-------|-----|---------|-------|---------|---------|--------|-----------|
  {%- set entity = 'sensor.predicted_sunrise_soc_day_1' %}
  {%- set d2 = 'sensor.predicted_sunrise_soc_day_2' %}
  {%- set soc = states(entity) | float(0) %}
  {%- if soc > 0 %}
  | {% if pre_sunrise %}This Morning{% else %}Tomorrow{% endif %} | {% if soc < 5 %}🔴{% elif soc < 15 %}🟡{% else %}🟢{% endif %} | {{ soc }}% | {{ state_attr(entity, 'predicted_kwh') }} | {{ state_attr(d2, 'morning_low_pct') }}% | {% if state_attr(d2, 'floor_hour') and state_attr(d2, 'night_floor_hour') %}{{ state_attr(d2, 'floor_hour') }}, {{ state_attr(d2, 'night_floor_hour') }}{% elif state_attr(d2, 'floor_hour') %}{{ state_attr(d2, 'floor_hour') }}{% elif state_attr(d2, 'night_floor_hour') %}{{ state_attr(d2, 'night_floor_hour') }}{% else %}—{% endif %} | {% if state_attr(entity, 'mode') == 'daytime' %}{{ state_attr(entity, 'remaining_solar_kwh') }}{% else %}0{% endif %} | {{ state_attr(entity, 'daytime_consumption_kwh') }} | {{ state_attr(entity, 'backup_charged_kwh') }} | {{ state_attr(entity, 'grid_needed_kwh') }} |
  {%- endif %}
  {%- for d in range(2, 8) %}
  {%- set entity = 'sensor.predicted_sunrise_soc_day_' ~ d %}
  {%- set soc = states(entity) | float(0) %}
  {%- set date = (now() + timedelta(days=d - 1 if pre_sunrise else d)).strftime('%a %-d %b') %}
  {%- set next_e = 'sensor.predicted_sunrise_soc_day_' ~ (d+1) if d < 7 else '' %}
  {%- if soc > 0 %}
  | {{ date }} | {% if soc < 5 %}🔴{% elif soc < 15 %}🟡{% else %}🟢{% endif %} | {{ soc }}% | {{ state_attr(entity, 'predicted_kwh') }} | {% if next_e %}{{ state_attr(next_e, 'morning_low_pct') }}%{% else %}—{% endif %} | {% if next_e %}{% if state_attr(next_e, 'floor_hour') and state_attr(next_e, 'night_floor_hour') %}{{ state_attr(next_e, 'floor_hour') }}, {{ state_attr(next_e, 'night_floor_hour') }}{% elif state_attr(next_e, 'floor_hour') %}{{ state_attr(next_e, 'floor_hour') }}{% elif state_attr(next_e, 'night_floor_hour') %}{{ state_attr(next_e, 'night_floor_hour') }}{% else %}—{% endif %}{% else %}—{% endif %} | {{ state_attr(entity, 'solcast_kwh') }} | {{ state_attr(entity, 'daytime_consumption_kwh') }} | {{ state_attr(entity, 'backup_charged_kwh') }} | {{ state_attr(entity, 'grid_needed_kwh') }} |
  {%- endif %}
  {%- endfor %}

  {% if state_attr('sensor.predicted_sunrise_soc_day_1', 'mode') == 'daytime' -%}
  Mode: ☀️ Daytime | Remaining solar: {{ state_attr('sensor.predicted_sunrise_soc_day_1', 'remaining_solar_kwh') }} kWh | Hours to sunset: {{ ((as_datetime(state_attr('sun.sun', 'next_setting')) - now()).total_seconds() / 3600) | round(1) }}h
  {%- else -%}
  Mode: 🌙 Nighttime | Backup: {{ state_attr('sensor.predicted_sunrise_soc_day_1', 'backup_charged_kwh') }} kWh
  {%- endif %}
  {% if state_attr('sensor.predicted_sunrise_soc_day_1', 'grid_needed_kwh') | float(0) > 0 -%}
  Grid needed: {{ state_attr('sensor.predicted_sunrise_soc_day_1', 'grid_needed_kwh') }} kWh to target ({{ state_attr('sensor.predicted_sunrise_soc_day_1', 'target_soc') }}%) | Used today: {{ state_attr('sensor.predicted_sunrise_soc_day_1', 'grid_used_today_kwh') }} kWh
  {%- endif %}
  {% set hourly = state_attr('sensor.7_day_average_daily_consumption', 'hourly_averages') -%}
  *{% if state_attr('sensor.predicted_sunrise_soc_day_1', 'using_fallback') %}Using estimated consumption (fallback values){% else %}Using 7-day averages (daily: {% if hourly %}{{ hourly | sum | round(1) }}{% else %}{{ states('sensor.7_day_average_daily_consumption') | round(1) }}{% endif %} kWh / overnight: {{ states('sensor.7_day_average_overnight_consumption') | round(1) }} kWh){% endif %}*
